<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Student PhishGuard Chatbox</title>
    <link rel="stylesheet" href="sidebar_chatbox.css" />
  </head>
  <body>
    <div id="chatbox-root">
      <div class="header">
        <span>🛡 Student PhishGuard</span>
        <button id="close-btn">×</button>
      </div>
      <div class="body">
        <p id="main-message"></p>
        <p id="explanation"></p>

        <h4>Tips for you:</h4>
        <ul id="tips"></ul>

        <h4>Quick quiz:</h4>
        <p id="quiz-question"></p>
        <div id="quiz-options"></div>
        <p id="quiz-feedback"></p>
      </div>
    </div>
    <script src="sidebar_chatbox.js"></script>
  </body>
</html>
